<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Summoner Tracker - LoL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0a0e1a;
      color: #c8aa6e;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 30px 20px;
    }

    h1 {
      font-size: 1.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: #c8aa6e;
      border-bottom: 1px solid #785a28;
      padding-bottom: 12px;
      width: 100%;
      max-width: 860px;
      text-align: center;
    }

    .lang-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .lang-btn {
      background: #0d1526;
      border: 1px solid #785a28;
      border-radius: 5px;
      color: #785a28;
      font-size: 0.75rem;
      font-weight: bold;
      padding: 5px 14px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    .lang-btn:hover { border-color: #c8aa6e; color: #c8aa6e; }
    .lang-btn.active { background: #785a28; color: #0a0e1a; border-color: #785a28; }

    .voice-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 860px;
      margin-bottom: 20px;
      background: #0d1526;
      border: 1px solid #785a28;
      border-radius: 8px;
      padding: 10px 16px;
    }

    .mic-btn {
      background: #1a2a4a;
      border: 2px solid #3a5a8a;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .mic-btn:hover { background: #243d6a; border-color: #7ec8e3; }
    .mic-btn.listening {
      background: #4a0a0a;
      border-color: #e74c3c;
      animation: pulse-mic 1s infinite;
    }
    @keyframes pulse-mic {
      0%, 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.5); }
      50%       { box-shadow: 0 0 0 8px rgba(231,76,60,0); }
    }

    .voice-status { font-size: 0.82rem; color: #888; flex: 1; }
    .voice-status span { color: #c8aa6e; font-style: italic; }
    .voice-hint { font-size: 0.72rem; color: #555; text-align: right; white-space: nowrap; }

    .board {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 860px;
    }

    .card {
      background: #0d1526;
      border: 1px solid #785a28;
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .slot-number {
      font-size: 0.72rem;
      font-weight: bold;
      color: #785a28;
      width: 80px;
      flex-shrink: 0;
      text-align: center;
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .slot-num { color: #4a7aaa; font-size: 0.85rem; }

    .name-input {
      background: #0a0e1a;
      border: 1px solid #785a28;
      border-radius: 5px;
      color: #c8aa6e;
      padding: 6px 10px;
      font-size: 0.9rem;
      width: 140px;
      outline: none;
      transition: border-color 0.2s;
    }
    .name-input:focus { border-color: #c8aa6e; }

    .checkboxes {
      display: flex;
      gap: 14px;
      margin-left: auto;
    }

    .check-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: #a0a0a0;
      cursor: pointer;
      white-space: nowrap;
    }
    .check-label input[type="checkbox"] {
      accent-color: #c8aa6e;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .boots-sel {
      background: #0a0e1a;
      border: 1px solid #785a28;
      border-radius: 4px;
      color: #c8aa6e;
      padding: 3px 5px;
      font-size: 0.72rem;
      outline: none;
      cursor: pointer;
    }
    .boots-sel:focus { border-color: #c8aa6e; }

    .spell-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 6px;
      background: #080d1a;
      border-left: 3px solid #27ae60;
      transition: border-color 0.3s;
    }
    .spell-row.on-cd { border-left-color: #c0392b; }
    .spell-row.maybe { border-left-color: #e67e22; }
    .spell-row.up    { border-left-color: #27ae60; }

    .spell-slot-label {
      font-size: 0.7rem;
      font-weight: bold;
      color: #4a7aaa;
      width: 12px;
      flex-shrink: 0;
      text-align: center;
    }

    .spell-select {
      background: #0a0e1a;
      border: 1px solid #785a28;
      border-radius: 5px;
      color: #c8aa6e;
      padding: 5px 6px;
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
      width: 130px;
      flex-shrink: 0;
    }
    .spell-select:focus { border-color: #c8aa6e; }

    .spell-btn {
      background: #1a2a4a;
      border: 2px solid #3a5a8a;
      border-radius: 6px;
      color: #7ec8e3;
      font-size: 0.82rem;
      font-weight: bold;
      padding: 7px 11px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .spell-btn:hover:not(:disabled) { background: #243d6a; border-color: #7ec8e3; }
    .spell-btn:disabled { cursor: not-allowed; opacity: 0.5; }

    .clocks {
      display: flex;
      gap: 8px;
      margin-left: auto;
      align-items: center;
    }

    .clock-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 62px;
    }

    .clock-label {
      font-size: 0.58rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 1px;
      color: #555;
    }

    .clock-time {
      font-size: 1.2rem;
      font-weight: bold;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
    }
    .clock-time.ticking-max { color: #e74c3c; }
    .clock-time.ticking-min { color: #e67e22; }
    .clock-time.done-min    { color: #e67e22; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; }
    .clock-time.up          { color: #2ecc71; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
    .clock-time.no-spell    { color: #333; font-size: 0.8rem; }

    .clock-divider {
      width: 1px;
      height: 32px;
      background: #2a3a5a;
    }

    .reset-btn {
      background: none;
      border: 1px solid #555;
      border-radius: 5px;
      color: #888;
      font-size: 0.72rem;
      padding: 5px 8px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .reset-btn:hover { color: #c8aa6e; border-color: #c8aa6e; }

    .footer {
      margin-top: 30px;
      font-size: 0.75rem;
      color: #444;
      text-align: center;
    }

    .signature {
      margin-top: 10px;
      font-size: 0.68rem;
      color: #2a3a4a;
      text-align: center;
      letter-spacing: 1px;
    }

    /* ── Mobile ─────────────────────────────────────────────────── */
    @media (max-width: 620px) {
      body { padding: 16px 10px; }
      h1 { font-size: 1.3rem; letter-spacing: 2px; margin-bottom: 10px; }
      .voice-hint { display: none; }
      .voice-bar { gap: 8px; padding: 8px 10px; }
      .voice-status { font-size: 0.76rem; }
      .board { gap: 10px; }

      .card { padding: 10px 12px; gap: 7px; }

      .card-header { flex-wrap: wrap; gap: 8px; }
      .name-input { flex: 1; min-width: 0; width: auto; }
      .checkboxes { margin-left: 0; width: 100%; gap: 14px; }

      .spell-row { gap: 6px; padding: 6px 8px; }
      .spell-select { width: 100px; font-size: 0.76rem; }
      .spell-btn { padding: 7px 8px; font-size: 0.74rem; }

      .clock-box { min-width: 50px; }
      .clock-time { font-size: 1rem; }
      .clock-time.done-min { font-size: 0.68rem; }
      .clock-time.up       { font-size: 0.72rem; }

      .reset-btn { font-size: 0.65rem; padding: 5px 6px; }
      .footer { margin-top: 18px; font-size: 0.65rem; }
    }
  </style>
</head>
<body>

<h1>Summoner Tracker</h1>

<div class="lang-bar">
  <button class="lang-btn active" data-lang="es">ES</button>
  <button class="lang-btn"        data-lang="en">EN</button>
  <button class="lang-btn"        data-lang="pt">PT</button>
</div>

<div class="voice-bar">
  <button class="mic-btn" id="mic-btn" title="Mic">🎙️</button>
  <div class="voice-status" id="voice-status"></div>
  <div class="voice-hint"   id="voice-hint"></div>
</div>

<div class="board" id="board"></div>

<div class="footer"    id="footer"></div>
<div class="signature">Brian Cersosimo - WELL PLAYED</div>

<script>
  // ── Constants ──────────────────────────────────────────────────────
  const COSMIC_AH          = 18;
  const BOOTS_AH           = 10;
  const BOOTS_UPGRADED_AH  = 20;
  const SPELL_ORDER = ['flash','ignite','exhaust','ghost','heal','barrier','cleanse','teleport','none'];
  const SPELL_CD    = { flash:300, ignite:180, exhaust:210, ghost:210, heal:240, barrier:180, cleanse:210, teleport:300, none:0 };

  // ── Translations ────────────────────────────────────────────────────
  const LANGS = {
    es: {
      speechLang: 'es-ES',
      roles: ['TOP', 'JUNGLA', 'MID', 'ADC', 'SOPORTE'],
      spells: {
        flash:'Flash', ignite:'Incendiar', exhaust:'Agotar', ghost:'Espectro',
        heal:'Curar', barrier:'Barrera', cleanse:'Purificar', teleport:'Teletransportar', none:'—',
      },
      voiceNums: {
        'uno':1,'dos':2,'tres':3,'cuatro':4,'cinco':5,
      },
      voiceRoles: {
        'top':1,'jungla':2,'jungle':2,'jg':2,'mid':3,'adc':4,'bot':4,'soporte':5,'support':5,'supp':5,
      },
      voiceSpells: {
        'teletransportar':'teleport','teleport':'teleport','tele':'teleport','tp':'teleport',
        'incendiar':'ignite','ignite':'ignite','igni':'ignite',
        'purificar':'cleanse','cleanse':'cleanse',
        'espectro':'ghost','ghost':'ghost',
        'agotar':'exhaust','exhaust':'exhaust',
        'barrera':'barrier','barrier':'barrier',
        'flash':'flash','flas':'flash',
        'curar':'heal','heal':'heal',
      },
      ui: {
        spellBtn:        'Usado',
        bootsNone:       'Sin botas',
        bootsRegular:    'Jónicas (10)',
        bootsUpgraded:   'Actualizadas (20)',
        conCI:           'Con CI',
        sinCI:           'Sin CI',
        champPlaceholder:'Campeón',
        ready:           'LISTO',
        maybeReady:      '¿LISTO?',
        footer:          'Con CI = con Cosmic Insight (CD mínimo) · Sin CI = sin Cosmic Insight (CD máximo)',
        voiceOff:        'Voz desactivada — presiona el micrófono',
        voiceHint:       '"flash top" · "incendiar 3" · "tp adc" · "reset espectro Jinx"',
        voiceListening:  'Escuchando... "incendiar top", "espectro 3", "tp adc", "reset agotar Jinx"',
        voiceProcessing: 'procesando...',
        voiceNoSlot:     'no entendí el slot',
        voiceNoSupport:  'Tu navegador no soporta reconocimiento de voz (usa Chrome/Edge)',
        voiceUsed:       (spell, labels) => `${spell} usado: ${labels}`,
        voiceReset:      (labels) => `reset: ${labels}`,
        voiceError:      (err) => `Error: ${err}`,
      },
    },

    en: {
      speechLang: 'en-US',
      roles: ['TOP', 'JUNGLE', 'MID', 'ADC', 'SUPPORT'],
      spells: {
        flash:'Flash', ignite:'Ignite', exhaust:'Exhaust', ghost:'Ghost',
        heal:'Heal', barrier:'Barrier', cleanse:'Cleanse', teleport:'Teleport', none:'—',
      },
      voiceNums: {
        'one':1,'two':2,'three':3,'four':4,'five':5,
      },
      voiceRoles: {
        'top':1,'jungle':2,'jg':2,'mid':3,'adc':4,'bot':4,'support':5,'supp':5,
      },
      voiceSpells: {
        'teleport':'teleport','tele':'teleport','tp':'teleport',
        'ignite':'ignite',
        'exhaust':'exhaust',
        'cleanse':'cleanse',
        'barrier':'barrier',
        'ghost':'ghost',
        'flash':'flash',
        'heal':'heal',
      },
      ui: {
        spellBtn:        'Used',
        bootsNone:       'No boots',
        bootsRegular:    'Ionian (10)',
        bootsUpgraded:   'Upgraded (20)',
        conCI:           'W/ CI',
        sinCI:           'W/O CI',
        champPlaceholder:'Champion',
        ready:           'READY',
        maybeReady:      'READY?',
        footer:          'W/ CI = with Cosmic Insight (min CD) · W/O CI = without Cosmic Insight (max CD)',
        voiceOff:        'Voice off — press the microphone',
        voiceHint:       '"flash top" · "ignite 3" · "tp adc" · "reset exhaust Jinx"',
        voiceListening:  'Listening... "ignite top", "ghost 3", "tp adc", "reset exhaust Jinx"',
        voiceProcessing: 'processing...',
        voiceNoSlot:     'could not understand the slot',
        voiceNoSupport:  'Your browser does not support voice recognition (use Chrome/Edge)',
        voiceUsed:       (spell, labels) => `${spell} used: ${labels}`,
        voiceReset:      (labels) => `reset: ${labels}`,
        voiceError:      (err) => `Error: ${err}`,
      },
    },

    pt: {
      speechLang: 'pt-BR',
      roles: ['TOP', 'SELVA', 'MID', 'ADC', 'SUPORTE'],
      spells: {
        flash:'Flash', ignite:'Inflamar', exhaust:'Exaurir', ghost:'Espectro',
        heal:'Curar', barrier:'Barreira', cleanse:'Purificar', teleport:'Teletransporte', none:'—',
      },
      voiceNums: {
        'um':1,'dois':2,'tres':3,'quatro':4,'cinco':5,
      },
      voiceRoles: {
        'top':1,'selva':2,'jungle':2,'jg':2,'mid':3,'adc':4,'bot':4,'suporte':5,'support':5,
      },
      voiceSpells: {
        'teletransporte':'teleport','teleport':'teleport','tele':'teleport','tp':'teleport',
        'inflamar':'ignite','ignite':'ignite',
        'purificar':'cleanse','cleanse':'cleanse',
        'espectro':'ghost','ghost':'ghost',
        'exaurir':'exhaust','exhaust':'exhaust',
        'barreira':'barrier','barrier':'barrier',
        'flash':'flash','flas':'flash',
        'curar':'heal','heal':'heal',
      },
      ui: {
        spellBtn:        'Usado',
        bootsNone:       'Sem botas',
        bootsRegular:    'Jônicas (10)',
        bootsUpgraded:   'Atualizadas (20)',
        conCI:           'Com CI',
        sinCI:           'Sem CI',
        champPlaceholder:'Campeão',
        ready:           'PRONTO',
        maybeReady:      'PRONTO?',
        footer:          'Com CI = com Cosmic Insight (CD mínimo) · Sem CI = sem Cosmic Insight (CD máximo)',
        voiceOff:        'Voz desativada — pressione o microfone',
        voiceHint:       '"flash top" · "inflamar 3" · "tp adc" · "reset espectro Jinx"',
        voiceListening:  'Ouvindo... "inflamar top", "espectro 3", "tp adc", "reset exaurir Jinx"',
        voiceProcessing: 'processando...',
        voiceNoSlot:     'não entendi o slot',
        voiceNoSupport:  'Seu navegador não suporta reconhecimento de voz (use Chrome/Edge)',
        voiceUsed:       (spell, labels) => `${spell} usado: ${labels}`,
        voiceReset:      (labels) => `reset: ${labels}`,
        voiceError:      (err) => `Erro: ${err}`,
      },
    },
  };

  let lang = 'es';
  let T    = LANGS[lang];

  // ── Spell regex (rebuilt on lang change) ───────────────────────────
  let SPELL_STRIP_RE;
  function buildSpellRE() {
    SPELL_STRIP_RE = new RegExp(
      `\\b(reset|${Object.keys(T.voiceSpells).sort((a,b) => b.length - a.length).join('|')})\\b`, 'g'
    );
  }
  buildSpellRE();

  // ── State ──────────────────────────────────────────────────────────
  const state = Array.from({ length: 5 }, () => ({
    name: '',
    bootsAH: 0,
    cosmicInsight: false,
    spells: [
      { key: 'flash',  timerMax: null, timerMin: null, remainingMax: 0, remainingMin: 0, status: 'up' },
      { key: 'ignite', timerMax: null, timerMin: null, remainingMax: 0, remainingMin: 0, status: 'up' },
    ],
  }));

  // ── Timer logic ────────────────────────────────────────────────────
  function getCDMax(i, key) {
    const cd = SPELL_CD[key] ?? 0;
    if (!cd) return 0;
    return Math.round(cd / (1 + state[i].bootsAH / 100));
  }

  function getCDMin(i, key) {
    const cd = SPELL_CD[key] ?? 0;
    if (!cd) return 0;
    return Math.round(cd / (1 + (COSMIC_AH + state[i].bootsAH) / 100));
  }

  function formatTime(s) {
    return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
  }

  function startCD(i, slot) {
    const sp = state[i].spells[slot];
    if (sp.timerMax || !SPELL_CD[sp.key]) return;

    sp.remainingMax = getCDMax(i, sp.key);
    sp.remainingMin = getCDMin(i, sp.key);
    sp.status = 'cd';
    updateSpellRow(i, slot);

    sp.timerMin = setInterval(() => {
      sp.remainingMin--;
      if (sp.remainingMin <= 0) {
        clearInterval(sp.timerMin);
        sp.timerMin = null;
        sp.remainingMin = 0;
        if (sp.status === 'cd') sp.status = 'maybe';
      }
      updateSpellRow(i, slot);
    }, 1000);

    sp.timerMax = setInterval(() => {
      sp.remainingMax--;
      if (sp.remainingMax <= 0) {
        clearInterval(sp.timerMax);
        sp.timerMax = null;
        sp.remainingMax = 0;
        sp.status = 'up';
      }
      updateSpellRow(i, slot);
    }, 1000);
  }

  function resetCD(i, slot) {
    const sp = state[i].spells[slot];
    clearInterval(sp.timerMax);
    clearInterval(sp.timerMin);
    sp.timerMax = null;
    sp.timerMin = null;
    sp.remainingMax = 0;
    sp.remainingMin = 0;
    sp.status = 'up';
    updateSpellRow(i, slot);
  }

  function updateCIVisibility(i, slot) {
    const sp    = state[i].spells[slot];
    const ciBox = document.getElementById(`ci-box-${i}-${slot}`);
    const ciDiv = document.getElementById(`ci-div-${i}-${slot}`);
    const show  = state[i].cosmicInsight && !!SPELL_CD[sp.key];
    ciBox.style.display = show ? '' : 'none';
    ciDiv.style.display = show ? '' : 'none';
  }

  function updateSpellRow(i, slot) {
    const sp      = state[i].spells[slot];
    const row     = document.getElementById(`spell-row-${i}-${slot}`);
    const btn     = document.getElementById(`spell-btn-${i}-${slot}`);
    const rstBtn  = document.getElementById(`reset-btn-${i}-${slot}`);
    const timeMax = document.getElementById(`time-max-${i}-${slot}`);
    const timeMin = document.getElementById(`time-min-${i}-${slot}`);
    const noSpell = !SPELL_CD[sp.key];

    updateCIVisibility(i, slot);
    row.className = `spell-row ${sp.status === 'cd' ? 'on-cd' : sp.status}`;

    if (noSpell) {
      timeMax.className = 'clock-time no-spell';
      timeMax.textContent = '—';
      timeMin.className = 'clock-time no-spell';
      timeMin.textContent = '—';
      btn.disabled = true;
      rstBtn.style.display = 'none';
    } else if (sp.status === 'up') {
      timeMax.className = 'clock-time up';
      timeMax.textContent = T.ui.ready;
      timeMin.className = 'clock-time up';
      timeMin.textContent = T.ui.ready;
      btn.disabled = false;
      rstBtn.style.display = 'none';
    } else if (sp.status === 'maybe') {
      timeMax.className = 'clock-time ticking-max';
      timeMax.textContent = formatTime(sp.remainingMax);
      timeMin.className = 'clock-time done-min';
      timeMin.textContent = T.ui.maybeReady;
      btn.disabled = true;
      rstBtn.style.display = 'inline-block';
    } else {
      timeMax.className = 'clock-time ticking-max';
      timeMax.textContent = formatTime(sp.remainingMax);
      timeMin.className = 'clock-time ticking-min';
      timeMin.textContent = formatTime(sp.remainingMin);
      btn.disabled = true;
      rstBtn.style.display = 'inline-block';
    }
  }

  // ── Voice ──────────────────────────────────────────────────────────
  function setVoiceStatus(text, highlight) {
    const el = document.getElementById('voice-status');
    el.innerHTML = highlight
      ? `Escuché / Heard: <span>${highlight}</span> — ${text}`
      : text;
  }

  function phonetic(str) {
    return str
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/ph/g, 'f')
      .replace(/qu/g, 'k')
      .replace(/c([ei])/g, 's$1')
      .replace(/c/g, 'k')
      .replace(/z/g, 's')
      .replace(/v/g, 'b')
      .replace(/y/g, 'i')
      .replace(/ll/g, 'i')
      .replace(/h/g, '')
      .replace(/(.)\1+/g, '$1')
      .replace(/[^a-z0-9 ]/g, '');
  }

  function detectSpell(raw) {
    const p = phonetic(raw);
    for (const [word, spell] of Object.entries(T.voiceSpells)) {
      if (p.includes(phonetic(word))) return spell;
    }
    return null;
  }

  function handleVoiceCommand(transcript) {
    const raw = transcript.toLowerCase().trim();
    setVoiceStatus(T.ui.voiceProcessing, raw);

    const isReset       = /\breset\b/.test(raw);
    const detectedSpell = detectSpell(raw);
    const targets       = new Set();
    const allVoiceWords = { ...T.voiceNums, ...T.voiceRoles };

    // Match digits
    for (const m of raw.matchAll(/\d+/g)) {
      for (const ch of m[0]) {
        const n = parseInt(ch);
        if (n >= 1 && n <= 5) targets.add(n - 1);
      }
    }

    // Match role/number words
    const rawP = phonetic(raw);
    for (const [word, num] of Object.entries(allVoiceWords)) {
      if (rawP.includes(phonetic(word))) targets.add(num - 1);
    }

    // Match champion names
    const cleaned = phonetic(raw.replace(SPELL_STRIP_RE, '').trim());
    if (cleaned.length > 1) {
      for (let i = 0; i < 5; i++) {
        const name = phonetic(state[i].name.trim());
        if (name && cleaned.includes(name)) targets.add(i);
      }
    }

    if (targets.size === 0) {
      setVoiceStatus(T.ui.voiceNoSlot, raw);
      return;
    }

    const labels = [];
    targets.forEach(i => {
      let slot = null;
      if (detectedSpell) {
        if (state[i].spells[0].key === detectedSpell) slot = 0;
        else if (state[i].spells[1].key === detectedSpell) slot = 1;
      }
      if (slot === null) {
        slot = state[i].spells[0].key === 'flash' ? 0
             : state[i].spells[1].key === 'flash' ? 1
             : 0;
      }
      if (isReset) resetCD(i, slot);
      else startCD(i, slot);
      const spellLabel = T.spells[state[i].spells[slot].key] ?? '?';
      labels.push(`${T.roles[i]} (${spellLabel})`);
    });

    const spellName = detectedSpell ? T.spells[detectedSpell] : T.spells['flash'];
    setVoiceStatus(
      isReset ? T.ui.voiceReset(labels.join(', ')) : T.ui.voiceUsed(spellName, labels.join(', ')),
      raw
    );
  }

  let recognition = null;
  let listening   = false;

  function setupVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      document.getElementById('mic-btn').disabled = true;
      setVoiceStatus(T.ui.voiceNoSupport);
      return;
    }

    recognition = new SR();
    recognition.lang = T.speechLang;
    recognition.continuous = true;
    recognition.interimResults = false;

    recognition.onresult = (e) => {
      const transcript = e.results[e.results.length - 1][0].transcript;
      handleVoiceCommand(transcript);
    };
    recognition.onerror = (e) => {
      if (e.error === 'no-speech') return;
      setVoiceStatus(T.ui.voiceError(e.error));
    };
    recognition.onend = () => { if (listening) recognition.start(); };

    document.getElementById('mic-btn').addEventListener('click', () => {
      if (!listening) {
        listening = true;
        recognition.start();
        document.getElementById('mic-btn').classList.add('listening');
        setVoiceStatus(T.ui.voiceListening);
      } else {
        listening = false;
        recognition.stop();
        document.getElementById('mic-btn').classList.remove('listening');
        setVoiceStatus(T.ui.voiceOff);
      }
    });
  }

  // ── Board ──────────────────────────────────────────────────────────
  function buildBoard() {
    const board = document.getElementById('board');
    board.innerHTML = '';

    for (let i = 0; i < 5; i++) {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = `card-${i}`;

      const header = document.createElement('div');
      header.className = 'card-header';
      header.innerHTML = `
        <div class="slot-number" id="slot-num-${i}"><span class="slot-num">${i + 1}</span> ${T.roles[i]}</div>
        <input class="name-input" type="text" placeholder="${T.ui.champPlaceholder}" id="name-${i}" maxlength="16" />
        <div class="checkboxes">
          <label class="check-label">
            <select class="boots-sel" id="boots-sel-${i}">
              <option value="0">${T.ui.bootsNone}</option>
              <option value="${BOOTS_AH}">${T.ui.bootsRegular}</option>
              <option value="${BOOTS_UPGRADED_AH}">${T.ui.bootsUpgraded}</option>
            </select>
          </label>
          <label class="check-label"><input type="checkbox" id="ci-${i}" /> Cosmic Insight</label>
        </div>
      `;
      card.appendChild(header);

      for (let s = 0; s < 2; s++) {
        const row = document.createElement('div');
        row.className = 'spell-row up';
        row.id = `spell-row-${i}-${s}`;

        const opts = SPELL_ORDER.map(k =>
          `<option value="${k}"${state[i].spells[s].key === k ? ' selected' : ''}>${T.spells[k]}</option>`
        ).join('');

        row.innerHTML = `
          <div class="spell-slot-label">${s === 0 ? 'D' : 'F'}</div>
          <select class="spell-select" id="spell-sel-${i}-${s}">${opts}</select>
          <button class="spell-btn" id="spell-btn-${i}-${s}">${T.ui.spellBtn}</button>
          <div class="clocks">
            <div class="clock-box" id="ci-box-${i}-${s}" style="display:none">
              <div class="clock-label" id="ci-clk-lbl-${i}-${s}">${T.ui.conCI}</div>
              <div class="clock-time up" id="time-min-${i}-${s}">${T.ui.ready}</div>
            </div>
            <div class="clock-divider" id="ci-div-${i}-${s}" style="display:none"></div>
            <div class="clock-box">
              <div class="clock-label" id="no-ci-clk-lbl-${i}-${s}">${T.ui.sinCI}</div>
              <div class="clock-time up" id="time-max-${i}-${s}">${T.ui.ready}</div>
            </div>
          </div>
          <button class="reset-btn" id="reset-btn-${i}-${s}" style="display:none">Reset</button>
        `;

        card.appendChild(row);
      }

      board.appendChild(card);

      // Events — after board.appendChild so getElementById works
      for (let s = 0; s < 2; s++) {
        document.getElementById(`spell-btn-${i}-${s}`)
          .addEventListener('click', () => startCD(i, s));
        document.getElementById(`reset-btn-${i}-${s}`)
          .addEventListener('click', () => resetCD(i, s));
        document.getElementById(`spell-sel-${i}-${s}`)
          .addEventListener('change', (e) => {
            resetCD(i, s);
            state[i].spells[s].key = e.target.value;
            updateSpellRow(i, s);
          });
      }

      document.getElementById(`boots-sel-${i}`).addEventListener('change', (e) => {
        state[i].bootsAH = parseInt(e.target.value);
      });
      document.getElementById(`ci-${i}`).addEventListener('change', (e) => {
        state[i].cosmicInsight = e.target.checked;
        updateCIVisibility(i, 0);
        updateCIVisibility(i, 1);
      });
      document.getElementById(`name-${i}`).addEventListener('input', (e) => {
        state[i].name = e.target.value;
      });
    }
  }

  // ── Language ───────────────────────────────────────────────────────
  function applyTranslations() {
    const ui = T.ui;
    document.documentElement.lang = lang;
    document.getElementById('voice-hint').textContent = ui.voiceHint;
    document.getElementById('footer').textContent     = ui.footer;
    if (!listening) setVoiceStatus(ui.voiceOff);

    for (let i = 0; i < 5; i++) {
      document.getElementById(`slot-num-${i}`).innerHTML =
        `<span class="slot-num">${i + 1}</span> ${T.roles[i]}`;
      document.getElementById(`name-${i}`).placeholder = ui.champPlaceholder;
      const bootsSel = document.getElementById(`boots-sel-${i}`);
      bootsSel.options[0].textContent = ui.bootsNone;
      bootsSel.options[1].textContent = ui.bootsRegular;
      bootsSel.options[2].textContent = ui.bootsUpgraded;

      for (let s = 0; s < 2; s++) {
        document.getElementById(`spell-btn-${i}-${s}`).textContent     = ui.spellBtn;
        document.getElementById(`ci-clk-lbl-${i}-${s}`).textContent    = ui.conCI;
        document.getElementById(`no-ci-clk-lbl-${i}-${s}`).textContent = ui.sinCI;

        const sel = document.getElementById(`spell-sel-${i}-${s}`);
        SPELL_ORDER.forEach(k => {
          const opt = sel.querySelector(`option[value="${k}"]`);
          if (opt) opt.textContent = T.spells[k];
        });

        updateSpellRow(i, s);
      }
    }

    if (recognition) recognition.lang = T.speechLang;
  }

  function setLanguage(l) {
    lang = l;
    T    = LANGS[l];
    buildSpellRE();
    document.querySelectorAll('.lang-btn').forEach(btn =>
      btn.classList.toggle('active', btn.dataset.lang === l)
    );
    applyTranslations();
  }

  // ── Init ───────────────────────────────────────────────────────────
  buildBoard();
  setupVoice();
  applyTranslations();

  document.querySelectorAll('.lang-btn').forEach(btn =>
    btn.addEventListener('click', () => setLanguage(btn.dataset.lang))
  );
</script>

</body>
